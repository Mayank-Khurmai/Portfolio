<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>404 — Page not found · Mayank Khurmai</title>
  <link rel="icon" type="image/jpeg" href="assets/mayank-hero.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=Inter:wght@400;500&family=JetBrains+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    .nf { min-height: 100vh; display: grid; place-items: center; text-align: center; padding: 24px; }
    .nf-code { font-family: 'Sora'; font-weight: 800; font-size: clamp(5rem, 22vw, 12rem); line-height: 1; }
    .nf p { color: var(--text-dim); max-width: 440px; margin: 12px auto 28px; }
    .nf code { font-family: 'JetBrains Mono', monospace; color: var(--cyan); }
  </style>
</head>
<body>
  <div class="bg-aurora" aria-hidden="true">
    <span class="orb orb-1"></span><span class="orb orb-2"></span><span class="orb orb-3"></span>
    <div class="grid-overlay"></div>
  </div>
  <div class="nf">
    <div>
      <div class="nf-code grad-text">404</div>
      <h1 style="font-family:'Sora';font-size:1.6rem;">This pipeline has no data</h1>
      <p>The page you're looking for doesn't exist or has been moved. Let's get you back to a working node.</p>
      <a class="btn btn-primary" href="/">← Back home</a>
    </div>
  </div>
</body>
</html>
